<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dengue Prediction Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
}

.container {
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
}

input, select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    background: #38bdf8;
    cursor: pointer;
}

.result {
    font-size: 20px;
    margin-top: 10px;
    color: #22c55e;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}
</style>
</head>

<body>

<header>Dengue Forecast Dashboard</header>

<div class="container">

<div class="card">
<h2>Test Prediction</h2>

<select id="city">
    <option value="San Juan">San Juan</option>
    <option value="Iquitos">Iquitos</option>
</select>

<input type="number" id="temp" placeholder="Temperature">
<input type="number" id="humidity" placeholder="Humidity">
<input type="number" id="rain" placeholder="Precipitation">

<button onclick="predict()">Predict</button>

<div class="result" id="output">Result will appear here</div>
</div>

<div class="grid">

<div class="card">
<h3>Model Comparison (MAE)</h3>
<canvas id="chart1"></canvas>
</div>

<div class="card">
<h3>Feature Reduction</h3>
<canvas id="chart2"></canvas>
</div>

</div>

</div>

<script>
// Fake prediction logic (simulate model)
function predict() {
    let temp = document.getElementById("temp").value;
    let humidity = document.getElementById("humidity").value;
    let rain = document.getElementById("rain").value;
    let city = document.getElementById("city").value;

    if (!temp || !humidity || !rain) {
        document.getElementById("output").innerHTML = "Please fill all inputs";
        return;
    }

    // Simple formula (just for demo)
    let prediction = (temp * 0.3) + (humidity * 0.4) + (rain * 0.2);

    document.getElementById("output").innerHTML =
        "Predicted Dengue Cases in " + city + ": " + prediction.toFixed(2);
}

// Charts
new Chart(document.getElementById("chart1"), {
    type: 'bar',
    data: {
        labels: ['KNN', 'RF', 'GBR', 'SVR'],
        datasets: [{
            label: 'MAE',
            data: [20, 35, 33, 18]
        }]
    }
});

new Chart(document.getElementById("chart2"), {
    type: 'bar',
    data: {
        labels: ['San Juan', 'Iquitos'],
        datasets: [{
            label: 'Before',
            data: [16, 16]
        },{
            label: 'After',
            data: [11, 8]
        }]
    }
});
</script>

</body>
</html>
